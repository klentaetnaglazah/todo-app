<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        
        <div class="add-todo-form">
            <div class="form-group">
                <label for="titleInput">Название задачи</label>
                <input type="text" id="titleInput" required>
            </div>
            
            <div class="form-group">
                <label for="descInput">Описание (необязательно)</label>
                <input type="text" id="descInput">
            </div>
            
            <div class="form-group">
                <label for="priorityInput">Приоритет</label>
                <select id="priorityInput">
                    <option value="low">Низкий</option>
                    <option value="medium" selected>Средний</option>
                    <option value="high">Высокий</option>
                </select>
            </div>
            
            <button type="button" id="addButton">Добавить</button>
        </div>

        <div class="controls">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="active">Активные</button>
                <button class="filter-btn" data-filter="completed">Выполненные</button>
            </div>
            <div class="search-group">
                <label for="searchInput">Поиск</label>
                <input type="text" id="searchInput">
            </div>
        </div>

        <div id="todosList"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
